<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pockety - Favorites - Travel</title>
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>
  <script>
    tailwind.config = { mode: 'jit', important: true };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Aclonica&family=Adamina&family=Actor&family=Afacad:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Segoe UI', Roboto, sans-serif;
    }

    .favorites-shell {
      background:
        radial-gradient(circle at 84% 12%, rgba(187, 208, 255, 0.92), transparent 32%),
        radial-gradient(circle at 12% 78%, rgba(210, 236, 223, 0.86), transparent 28%),
        linear-gradient(180deg, rgba(252, 249, 244, 1) 0%, rgba(244, 248, 252, 1) 100%);
    }

    .disc-shell {
      background: rgba(255, 255, 255, 0.62);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 20px 48px rgba(84, 110, 101, 0.14);
    }

    .disc-shell::before {
      content: "";
      position: absolute;
      inset: 74px 20px 32px;
      border-radius: 999px;
      background:
        radial-gradient(circle, rgba(255, 255, 255, 0.52) 0%, rgba(255, 255, 255, 0.08) 48%, rgba(255, 255, 255, 0) 72%),
        radial-gradient(circle, rgba(186, 213, 201, 0.15) 0%, rgba(186, 213, 201, 0) 70%);
      pointer-events: none;
    }

    .disc-viewport {
      touch-action: none;
      user-select: none;
      cursor: grab;
    }

    .disc-viewport.is-dragging {
      cursor: grabbing;
    }

    .disc-ring {
      position: absolute;
      inset: 0;
    }

    .orbit-card {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 142px;
      min-height: 108px;
      padding: 15px 13px 13px;
      border-radius: 24px;
      color: rgba(34, 52, 43, 1);
      box-shadow: 0 16px 28px rgba(70, 86, 79, 0.14);
      transform-origin: center center;
      transition: transform 180ms ease, opacity 180ms ease, box-shadow 180ms ease;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.28);
      cursor: pointer;
    }

    .orbit-card::after {
      content: "";
      position: absolute;
      right: 10px;
      bottom: 10px;
      width: 24px;
      height: 24px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.34);
    }

    .orbit-card::before {
      content: "";
      position: absolute;
      right: 18px;
      bottom: 18px;
      width: 7px;
      height: 7px;
      border-top: 2px solid rgba(56, 86, 72, 0.7);
      border-right: 2px solid rgba(56, 86, 72, 0.7);
      transform: rotate(45deg);
      z-index: 2;
      pointer-events: none;
      animation: cardArrowPulse 1.6s ease-in-out infinite;
    }

    .orbit-card.is-active {
      width: 190px;
      min-height: 140px;
      box-shadow: 0 20px 36px rgba(62, 95, 80, 0.22);
    }

    .orbit-card:hover,
    .orbit-card:focus-visible {
      transform: translate(-50%, -50%) scale(1.03) !important;
      filter: brightness(1.04);
      box-shadow: 0 22px 38px rgba(62, 95, 80, 0.24);
    }

    .orbit-card:active {
      transform: translate(-50%, -50%) scale(0.98) !important;
      filter: brightness(0.98);
    }

    .orbit-title {
      font-family: 'Adamina', serif;
      font-size: 21px;
      line-height: 0.95;
      margin-bottom: 9px;
    }

    .orbit-card.is-active .orbit-title {
      font-size: 30px;
    }

    .orbit-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      max-width: 106px;
    }

    .orbit-card.is-active .orbit-tags {
      max-width: 144px;
    }

    .orbit-tag {
      font-family: 'Actor', sans-serif;
      font-size: 11px;
      line-height: 1;
      padding: 5px 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.38);
    }

    .orbit-note {
      margin-top: 8px;
      font-family: 'Afacad', sans-serif;
      font-size: 11px;
      line-height: 1.28;
      color: rgba(55, 67, 61, 0.72);
    }

    .orbit-card.is-active .orbit-note {
      font-size: 13px;
    }

    .mini-assistant {
      transition: transform 180ms ease, filter 180ms ease, opacity 180ms ease;
    }

    .mini-assistant:hover,
    .mini-assistant:focus-visible {
      transform: translateY(-2px) scale(1.03);
      filter: brightness(1.05);
    }

    .mini-assistant:active {
      transform: scale(0.95);
      opacity: 0.92;
    }

    .clickable-cue {
      transition: transform 180ms ease, filter 180ms ease, opacity 180ms ease;
    }

    .clickable-cue:hover,
    .clickable-cue:focus-visible {
      transform: scale(1.04);
      filter: brightness(1.06);
    }

    .clickable-cue:active {
      transform: scale(0.95);
      opacity: 0.92;
    }

    .nav-button {
      transition: transform 160ms ease, opacity 160ms ease;
    }

    .nav-button:hover {
      transform: translateY(-1px) scale(1.04);
    }

    .nav-button:active,
    .nav-button.nav-press {
      transform: scale(0.92);
      opacity: 0.9;
    }

    .disc-sync {
      position: absolute;
      inset: 112px 18px 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      border-radius: 32px;
      background: rgba(255, 255, 255, 0.42);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: opacity 260ms ease, visibility 260ms ease;
      z-index: 16;
    }

    .disc-sync.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .disc-sync-spinner {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      border: 3px solid rgba(78, 122, 98, 0.2);
      border-top-color: rgba(78, 122, 98, 0.9);
      animation: discSpin 0.9s linear infinite;
    }

    .disc-sync-text {
      font-family: 'Afacad', sans-serif;
      font-size: 18px;
      color: rgba(56, 96, 75, 0.88);
    }

    .disc-sync-subtext {
      font-family: 'Afacad', sans-serif;
      font-size: 14px;
      color: rgba(75, 100, 90, 0.72);
    }

    .disc-sync-orbit {
      position: relative;
      width: 120px;
      height: 120px;
      animation: discFloat 2.4s ease-in-out infinite;
    }

    .disc-sync-orbit::before,
    .disc-sync-orbit::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      background: rgba(129, 181, 151, 0.26);
    }

    .disc-sync-orbit::before {
      inset: 18px;
      border: 1px dashed rgba(92, 138, 113, 0.28);
      background: transparent;
      animation: discRotate 7s linear infinite;
    }

    .disc-sync-orbit::after {
      width: 28px;
      height: 28px;
      left: 46px;
      top: 46px;
      background: linear-gradient(145deg, rgba(214, 239, 226, 0.98) 0%, rgba(116, 170, 142, 0.96) 100%);
      box-shadow: 0 8px 18px rgba(89, 132, 108, 0.18);
    }

    @keyframes discSpin {
      to { transform: rotate(360deg); }
    }

    @keyframes discRotate {
      to { transform: rotate(360deg); }
    }

    @keyframes discFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    @keyframes cardArrowPulse {
      0%, 100% {
        opacity: 0.75;
        transform: rotate(45deg) translate(0, 0);
      }
      50% {
        opacity: 1;
        transform: rotate(45deg) translate(1px, -1px);
      }
    }
  </style>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">

    <div class="absolute inset-x-0 top-0 h-[132px] bg-[linear-gradient(180deg,_rgba(252,249,244,0.95)_0%,rgba(252,249,244,0.68)_55%,rgba(252,249,244,0)_100%)]"></div>

          <button id="newDocumentButton" type="button" class="clickable-cue h-[34px] rounded-[17px] bg-[rgba(231,246,238,0.88)] px-[12px] font-['Afacad'] text-[14px] font-semibold text-[rgba(45,102,74,1)] shadow-[0_8px_18px_rgba(120,140,128,0.1)]">+ New Document</button>
          <button id="assistantTrigger" type="button" class="mini-assistant relative w-[72px] h-[72px] z-20 overflow-visible" aria-label="Open AI Assistant">

            <span class="absolute -top-[8px] -left-[10px] inline-flex h-[28px] items-center rounded-[20px] bg-[rgba(255,255,255,0.72)] px-[10px] font-['Afacad'] text-[16px] text-[rgba(70,70,70,0.78)]">Hi!</span>
          </button>

      </div>

      <div id="discViewport" class="disc-viewport absolute inset-x-0 top-[112px] bottom-[22px] z-10">

    <div class="w-[506px] h-[62px] flex flex-row flex-nowrap justify-center items-center pt-[21px] box-border pb-[19px] absolute top-0 -left-[52px]">
      <div class="w-[152px] h-[22px] flex flex-row flex-nowrap justify-center items-center pt-[1.50px] box-border mr-[154px]">
        <div class="text-[17px] whitespace-nowrap text-center text-[rgba(0,0,0,1)] leading-[22px] font-[590]">9:41</div>
      </div>
      <div class="w-[152px] h-[22px] flex flex-row flex-nowrap justify-center items-center pt-px box-border pr-px">
        <img src="./public/assets/favorites-travel/image_11.png" class="w-[19.20px] h-[12.23px] mr-[7px]" />
        <img src="./public/assets/favorites-travel/image_12.png" class="w-[17.14px] h-[12.33px] mr-[7px]" />
        <img src="./public/assets/favorites-travel/image_13.png" class="w-[27.33px] h-[13px]" />
      </div>
    </div>

    <div class="absolute top-[768px] left-0 w-[402px] h-[89px]">
      <div class="w-[402px] rounded-[52px] [box-shadow:inset_0px_-4px_4px_0px_rgba(0,0,0,0.25),_inset_0px_0px_4px_0px_rgba(0,0,0,0.25)] bg-[rgba(255,255,255,0.96)] min-h-[89px] absolute top-0 left-0"></div>
      <button id="navFavorite" type="button" class="nav-button absolute top-[6px] left-[113px] w-[77px] h-[77px]">
        <img src="./public/assets/favorites-travel/image_16.png" class="w-[77px] h-[77px]" />

      <div class="w-[302px] h-[41.67px] flex flex-row flex-nowrap justify-start items-center absolute top-[22px] left-[47px]">

  <div id="documentModal" class="fixed inset-0 z-[999] hidden items-center justify-center bg-[rgba(18,28,23,0.45)] px-[18px]">
    <div class="w-full max-w-[360px] rounded-[22px] bg-white p-[16px] shadow-[0_20px_48px_rgba(30,52,43,0.28)]">

    </div>

  <script>
    (function () {
      const API_BASE = (() => {
        if (window.__POCKETY_API_BASE__) return window.__POCKETY_API_BASE__.replace(/\/$/, '');
        if (window.location.port === '5500') return window.location.protocol + '//' + window.location.hostname + ':8000';
        return '/api';
      })();
      const STORAGE_KEY = 'pockety-custom-favorites';
      const HIDDEN_KEY = 'pockety-hidden-favorite-categories';
      const activeSlug = 'travel';
      const discViewport = document.getElementById('discViewport');
      const discRing = document.getElementById('discRing');
      const activeBoardTitle = document.getElementById('activeBoardTitle');
      const activeBoardCopy = document.getElementById('activeBoardCopy');
      const activeBoardMeta = document.getElementById('activeBoardMeta');
      const discSyncState = document.getElementById('discSyncState');
      const discSyncHint = document.getElementById('discSyncHint');
      const assistantTrigger = document.getElementById('assistantTrigger');
      const createCollectionButton = document.getElementById('createCollectionButton');
      const deleteCollectionButton = document.getElementById('deleteCollectionButton');
      const newDocumentButton = document.getElementById('newDocumentButton');
      const documentModal = document.getElementById('documentModal');
      const documentCancelButton = document.getElementById('documentCancelButton');
      const documentForm = document.getElementById('documentForm');
      const documentSaveButton = document.getElementById('documentSaveButton');
      const documentModalMessage = document.getElementById('documentModalMessage');
      const docTitleInput = document.getElementById('docTitle');
      const docContentInput = document.getElementById('docContent');
      const docCategoryInput = document.getElementById('docCategory');
      const docTagsInput = document.getElementById('docTags');
      const uploadDocumentForm = document.getElementById('uploadDocumentForm');
      const uploadSubmitButton = document.getElementById('uploadSubmitButton');
      const uploadFileInput = document.getElementById('uploadFile');
      const selectedFileName = document.getElementById('selectedFileName');
      const globalToast = document.getElementById('globalToast');
      const globalToastTitle = document.getElementById('globalToastTitle');
      const globalToastMessage = document.getElementById('globalToastMessage');
      const globalToastIcon = document.getElementById('globalToastIcon');
      const globalToastClose = document.getElementById('globalToastClose');
      let globalToastTimer = null;

      const palettes = [
        'linear-gradient(145deg, rgba(213,236,223,0.98) 0%, rgba(111,161,141,0.95) 100%)',
        'linear-gradient(145deg, rgba(250,240,217,0.98) 0%, rgba(179,213,145,0.94) 100%)',
        'linear-gradient(145deg, rgba(222,234,255,0.96) 0%, rgba(155,187,242,0.94) 100%)',
        'linear-gradient(145deg, rgba(250,231,221,0.98) 0%, rgba(229,187,161,0.92) 100%)'
      ];

      const slots = {
        '-2': { x: 54, y: 344, scale: 0.72, opacity: 0.36, z: 7 },
        '-1': { x: 95, y: 236, scale: 0.84, opacity: 0.66, z: 11 },
        '0': { x: 183, y: 196, scale: 1, opacity: 1, z: 20 },
        '1': { x: 271, y: 236, scale: 0.84, opacity: 0.66, z: 11 },
        '2': { x: 312, y: 344, scale: 0.72, opacity: 0.36, z: 7 }
      };

      const defaultBoards = [
        { slug: 'travel', title: 'Travel', tags: ['#aranya', '#vlog'], description: 'Sea breeze, architecture, and memorable routes you want to keep.', path: './my-favorite.html?category=travel' },
        { slug: 'resume', title: 'Resume', tags: ['#interview', '#mass apply'], description: 'Highlights and references that can support your next application.', path: './my-favorite.html?category=resume' },
        { slug: 'music', title: 'Music', tags: ['#live', '#k-pop'], description: 'Concert moments, playlists, and stages worth revisiting.', path: './my-favorite.html?category=music' },
        { slug: 'java', title: 'Java', tags: ['#http', '#mysql'], description: 'Backend notes, patterns, and small wins from your coding sessions.', path: './my-favorite.html?category=java' },
        { slug: 'workout', title: 'Workout', tags: ['#hiit', '#pilates'], description: 'Training clips and routines you may want to revisit this week.', path: './my-favorite.html?category=workout' }
      ];
      let backendBoards = [];
      let syncResolved = false;

      const state = {
        rotation: 0,
        dragStartX: 0,
        rotationStart: 0,
        isDragging: false,
        hasMoved: false,
        activeIndex: 0,
        cards: []
      };

      function readCustomBoards() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          const parsed = raw ? JSON.parse(raw) : [];
          return Array.isArray(parsed) ? parsed : [];
        } catch (error) {
          return [];
        }
      }

      function readHiddenCategories() {
        try {
          const raw = localStorage.getItem(HIDDEN_KEY);
          const parsed = raw ? JSON.parse(raw) : [];
          return Array.isArray(parsed) ? parsed : [];
        } catch (error) {
          return [];
        }
      }

      function writeHiddenCategories(categories) {
        localStorage.setItem(HIDDEN_KEY, JSON.stringify(categories));
      }

      function hideCategory(slug) {
        const hidden = readHiddenCategories();
        if (hidden.indexOf(slug) === -1) {
          hidden.push(slug);
          writeHiddenCategories(hidden);
        }
      }

      function normalizeCustomBoard(item, index) {
        const title = String(item.title || 'New Favorite').trim() || 'New Favorite';
        const description = String(item.description || '').trim();
        const tags = Array.isArray(item.tags) && item.tags.length ? item.tags : ['#custom', '#favorite'];
        const slug = String(item.slug || ('custom-' + slugify(title + '-' + (item.createdAt || index)))).trim();
        return {
          slug: slug,
          title: title,
          tags: tags.slice(0, 3),
          description: description || 'A custom favorite board created by you.',
          path: './my-favorite.html?category=' + encodeURIComponent(slug)
        };
      }

      function buildBoards() {
        const hidden = readHiddenCategories();
        const customBoards = readCustomBoards().map(normalizeCustomBoard);
        const sourceBoards = backendBoards.concat(defaultBoards).concat(customBoards);
        const seen = Object.create(null);
        const mergedBoards = sourceBoards.filter(function (board) {
          if (!board || !board.slug) {
            return false;
          }
          if (seen[board.slug]) {
            return false;
          }
          seen[board.slug] = true;
          return true;
        });
        return mergedBoards.filter(function (board) {
          return hidden.indexOf(board.slug) === -1;
        });
      }

      function titleFromSlug(slug) {
        const value = String(slug || '').trim();
        if (!value) return 'Other';
        return value.charAt(0).toUpperCase() + value.slice(1);
      }

      function slugify(value) {
        return String(value || '')
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, '-')
          .replace(/^-+|-+$/g, '') || 'other';
      }

      function toTagsFromTitle(title) {
        const words = String(title || '').toLowerCase().split(/[^a-z0-9]+/).filter(Boolean);
        if (!words.length) return ['#favorite'];
        return words.slice(0, 2).map(function (word) { return '#' + word; });
      }

      async function fetchBoardsFromBackend() {
        try {
          const docsResp = await fetch(API_BASE + '/documents');
          const themesResp = await fetch(API_BASE + '/themes');
          const docs = docsResp.ok ? await docsResp.json() : [];
          const themes = themesResp.ok ? await themesResp.json() : [];

          const countByCategory = Object.create(null);
          (Array.isArray(docs) ? docs : []).forEach(function (doc) {
            const category = slugify(doc && doc.category);
            countByCategory[category] = (countByCategory[category] || 0) + 1;
          });

          const boards = [];
          (Array.isArray(themes) ? themes : []).forEach(function (theme) {
            const slug = slugify(theme && theme.slug);
            const title = String(theme && theme.title || '').trim() || titleFromSlug(slug);
            const tags = Array.isArray(theme && theme.tags) ? theme.tags : ['#' + slug];
            const desc = String(theme && theme.description || '').trim();
            const count = countByCategory[slug] || 0;
            boards.push({
              slug: slug,
              title: title,
              tags: tags.slice(0, 3),
              description: (count + ' docs saved in this theme.') + (desc ? (' ' + desc) : ''),
              path: './my-favorite.html?category=' + encodeURIComponent(slug),
              count: count
            });
          });

          // Also expose categories that exist only via documents (legacy data).
          const seen = Object.create(null);
          boards.forEach(function (b) { if (b && b.slug) seen[b.slug] = true; });
          Object.keys(countByCategory).forEach(function (slug) {
            if (seen[slug]) return;
            const count = countByCategory[slug] || 0;
            boards.push({
              slug: slug,
              title: titleFromSlug(slug),
              tags: ['#' + slug],
              description: count + ' docs saved in this theme.',
              path: './my-favorite.html?category=' + encodeURIComponent(slug),
              count: count
            });
          });

          // Sort: user themes first (by created order from API), then doc-only categories.
          return boards;
        } catch (error) {
          return [];
        }
      }

      function setDiscSync(visible, hint) {
        if (!discSyncState) return;
        discSyncState.classList.toggle('is-hidden', !visible);
        if (discSyncHint && hint) {
          discSyncHint.textContent = hint;
        }
      }

      function setModalMessage(message, isError) {
        documentModalMessage.textContent = message || '';
        documentModalMessage.style.color = isError ? 'rgba(150,62,62,1)' : 'rgba(79,98,89,0.9)';
      }

      function setSubmitting(button, submitting, text) {
        if (!button) return;
        if (submitting) {
          button.dataset.originalText = button.textContent;
          button.textContent = text || 'Submitting...';
          button.disabled = true;
          button.style.opacity = '0.7';
        } else {
          button.textContent = button.dataset.originalText || button.textContent;
          button.disabled = false;
          button.style.opacity = '1';
        }
      }

      function showGlobalToast(title, message, isError) {
        if (!globalToast) return;
        if (globalToastTimer) {
          clearTimeout(globalToastTimer);
          globalToastTimer = null;
        }
        if (globalToastTitle) globalToastTitle.textContent = title || (isError ? 'Failed' : 'Success');
        if (globalToastMessage) globalToastMessage.textContent = message || '';
        if (globalToastIcon) globalToastIcon.style.background = isError ? 'rgba(150,62,62,1)' : 'rgba(58,117,86,1)';
        globalToast.classList.remove('hidden');
        globalToastTimer = setTimeout(function () {
          globalToast.classList.add('hidden');
        }, 2600);
      }

      if (globalToastClose && globalToast) {
        globalToastClose.addEventListener('click', function () {
          globalToast.classList.add('hidden');
        });
      }

      function openDocumentModal() {
        if (!documentModal) return;
        const activeBoard = state.cards[state.activeIndex] && state.cards[state.activeIndex].board;
        documentModal.classList.remove('hidden');
        documentModal.classList.add('flex');
        if (docCategoryInput && activeBoard && activeBoard.slug) {
          docCategoryInput.value = activeBoard.slug;
        }
        setModalMessage('', false);
      }

      function closeDocumentModal() {
        if (!documentModal) return;
        documentModal.classList.add('hidden');
        documentModal.classList.remove('flex');
        setModalMessage('', false);
      }

      async function refreshDiscFromBackend() {
        backendBoards = await fetchBoardsFromBackend();
        state.rotation = 0;
        initDisc();
      }

      async function waitForBackendBoards() {
        const attempts = 10;
        for (let attempt = 0; attempt < attempts; attempt += 1) {
          const boards = await fetchBoardsFromBackend();
          if (boards.length) {
            return boards;
          }
          if (attempt < attempts - 1) {
            setDiscSync(true, 'Preparing your saved themes (' + (attempt + 1) + '/' + attempts + ')');
            await new Promise(function (resolve) { setTimeout(resolve, 900); });
          }
        }
        return [];
      }

      function createTag(tag) {
        const el = document.createElement('span');
        el.className = 'orbit-tag';
        el.textContent = tag;
        return el;
      }

      function createCard(board, index) {
        const card = document.createElement('button');
        card.type = 'button';
        card.className = 'orbit-card text-left';
        card.style.background = palettes[index % palettes.length];

        const title = document.createElement('div');
        title.className = 'orbit-title';
        title.textContent = board.title;

        const tags = document.createElement('div');
        tags.className = 'orbit-tags';
        board.tags.forEach(function (tag) { tags.appendChild(createTag(tag)); });

        const note = document.createElement('div');
        note.className = 'orbit-note';
        note.textContent = board.description;

        card.appendChild(title);
        card.appendChild(tags);
        card.appendChild(note);

        card.addEventListener('click', function () {
          if (state.hasMoved) {
            return;
          }
          if (board.path) {
            window.location.href = board.path;
            return;
          }
          window.location.href = './ai-assistant.html?q=' + encodeURIComponent('Tell me about my ' + board.title + ' favorites.');
        });

        return card;
      }

      function rotateToIndex(index) {
        const total = state.cards.length;
        if (!total) return;
        const step = 360 / total;
        state.rotation = -index * step;
        renderDisc();
      }

      function normalizeDiff(diff, total) {
        while (diff > total / 2) diff -= total;
        while (diff < -total / 2) diff += total;
        return diff;
      }

      function interpolateSlot(diff) {
        if (diff < -2.35 || diff > 2.35) {
          return null;
        }

        if (diff <= -2) {
          return slots['-2'];
        }

        if (diff >= 2) {
          return slots['2'];
        }

        const lower = Math.floor(diff);
        const upper = Math.ceil(diff);
        const lowerSlot = slots[String(lower)];
        const upperSlot = slots[String(upper)];

        if (!lowerSlot || !upperSlot) {
          return slots[String(Math.round(diff))] || null;
        }

        if (lower === upper) {
          return lowerSlot;
        }

        const progress = diff - lower;
        return {
          x: lowerSlot.x + (upperSlot.x - lowerSlot.x) * progress,
          y: lowerSlot.y + (upperSlot.y - lowerSlot.y) * progress,
          scale: lowerSlot.scale + (upperSlot.scale - lowerSlot.scale) * progress,
          opacity: lowerSlot.opacity + (upperSlot.opacity - lowerSlot.opacity) * progress,
          z: Math.round(lowerSlot.z + (upperSlot.z - lowerSlot.z) * progress)
        };
      }

      function renderDisc() {
        const total = state.cards.length;
        if (!total) return;

        const step = 360 / total;
        const floatIndex = -state.rotation / step;
        let activeIndex = Math.round(floatIndex);
        activeIndex = ((activeIndex % total) + total) % total;
        state.activeIndex = activeIndex;

        state.cards.forEach(function (entry, index) {
          const diff = normalizeDiff(index - floatIndex, total);
          const slot = interpolateSlot(diff);
          const visible = !!slot;

          entry.element.style.visibility = visible ? 'visible' : 'hidden';
          entry.element.style.pointerEvents = visible ? 'auto' : 'none';

          if (!visible) {
            entry.element.style.opacity = '0';
            return;
          }

          entry.element.style.left = slot.x + 'px';
          entry.element.style.top = slot.y + 'px';
          entry.element.style.zIndex = String(slot.z);
          entry.element.style.opacity = String(slot.opacity);
          entry.element.style.transform = 'translate(-50%, -50%) scale(' + slot.scale + ')';
          entry.element.classList.toggle('is-active', Math.abs(diff) < 0.5);
        });

        const activeBoard = state.cards[activeIndex].board;
        activeBoardTitle.textContent = activeBoard.title;
        activeBoardCopy.textContent = activeBoard.description;
        activeBoardMeta.textContent = Math.min(5, total) + ' visible on disc' + (total > 5 ? ' • rotate for more' : '');
      }

      function initDisc() {
        const boards = buildBoards();
        discRing.innerHTML = '';
        if (!boards.length) {
          activeBoardTitle.textContent = 'No collections';
          activeBoardCopy.textContent = 'Use + New to create a new favorite collection.';
          activeBoardMeta.textContent = '0 visible on disc';
          state.cards = [];
          return;
        }
        state.cards = boards.map(function (board, index) {
          const element = createCard(board, index);
          discRing.appendChild(element);
          return { board: board, element: element };
        });

        const activeIndex = boards.findIndex(function (board) { return board.slug === activeSlug; });
        if (activeIndex >= 0) {
          state.rotation = -(360 / boards.length) * activeIndex;
        }
        renderDisc();
      }

      discViewport.addEventListener('pointerdown', function (event) {
        state.isDragging = true;
        state.hasMoved = false;
        state.dragStartX = event.clientX;
        state.rotationStart = state.rotation;
        discViewport.classList.add('is-dragging');
      });

      discViewport.addEventListener('pointermove', function (event) {
        if (!state.isDragging) return;
        const delta = event.clientX - state.dragStartX;
        if (Math.abs(delta) > 6) {
          state.hasMoved = true;
        }
        state.rotation = state.rotationStart + delta * 0.32;
        renderDisc();
      });

      function endDrag(event) {
        if (!state.isDragging) return;
        state.isDragging = false;
        discViewport.classList.remove('is-dragging');
        if (!state.cards.length) {
          return;
        }
        const step = 360 / state.cards.length;
        const snapped = Math.round(-state.rotation / step);
        state.rotation = -snapped * step;
        renderDisc();
        setTimeout(function () {
          state.isDragging = false;
          state.hasMoved = false;
        }, 40);
      }

      discViewport.addEventListener('pointerup', endDrag);
      discViewport.addEventListener('pointercancel', endDrag);
      discViewport.addEventListener('wheel', function (event) {
        event.preventDefault();
        if (!state.cards.length) {
          return;
        }
        state.rotation += event.deltaY * -0.09;
        renderDisc();
        clearTimeout(discViewport._wheelTimer);
        discViewport._wheelTimer = setTimeout(function () {
          const step = 360 / state.cards.length;
          const snapped = Math.round(-state.rotation / step);
          state.rotation = -snapped * step;
          renderDisc();
        }, 90);
      }, { passive: false });

      [
        { id: 'navHome', path: './home.html' },
        { id: 'navFavorite', path: './favorites-travel.html' },
        { id: 'navHistory', path: './history-report.html' },
        { id: 'navWeekly', path: './weekly-report.html' },
        { id: 'navProfile', path: './profile.html' }
      ].forEach(function (item) {
        const button = document.getElementById(item.id);
        if (!button) return;
        button.addEventListener('click', function () {
          button.classList.add('nav-press');
          setTimeout(function () { window.location.href = item.path; }, 90);
        });
      });

      assistantTrigger.addEventListener('click', function () {
        const activeBoard = state.cards[state.activeIndex] && state.cards[state.activeIndex].board;
        const boardTitle = activeBoard ? activeBoard.title : 'travel';
        window.location.href = './ai-assistant.html?q=' + encodeURIComponent('Summarize my ' + boardTitle + ' favorites.');
      });

      createCollectionButton.addEventListener('click', function () {
        window.location.href = './add-theme.html?from=' + encodeURIComponent(activeSlug);
      });

      deleteCollectionButton.addEventListener('click', function () {
        const activeBoard = state.cards[state.activeIndex] && state.cards[state.activeIndex].board;
        if (!activeBoard) {
          return;
        }
        hideCategory(activeBoard.slug);
        state.rotation = 0;
        initDisc();
      });

      if (newDocumentButton) {
        newDocumentButton.addEventListener('click', openDocumentModal);
      }

      if (documentCancelButton) {
        documentCancelButton.addEventListener('click', closeDocumentModal);
      }

      if (documentModal) {
        documentModal.addEventListener('click', function (event) {
          if (event.target === documentModal) {
            closeDocumentModal();
          }
        });
      }

      if (uploadFileInput && selectedFileName) {
        uploadFileInput.addEventListener('change', function () {
          const file = uploadFileInput.files && uploadFileInput.files[0];
          selectedFileName.textContent = file ? ('Selected: ' + file.name) : 'Selected: none';
        });
      }

      if (documentForm) {
        documentForm.addEventListener('submit', async function (event) {
          event.preventDefault();
          const title = String(docTitleInput && docTitleInput.value || '').trim();
          const category = String(docCategoryInput && docCategoryInput.value || '').trim();
          const content = String(docContentInput && docContentInput.value || '').trim();
          const tagsRaw = String(docTagsInput && docTagsInput.value || '').trim();
          if (!title || !content) {
            setModalMessage('Please fill in title and content.', true);
            return;
          }
          const payload = { title: title, content: content };
          if (category) {
            payload.category = category;
          }
          const tags = tagsRaw ? tagsRaw.split(',').map(function (item) { return item.trim(); }).filter(Boolean) : [];
          if (tags.length) {
            payload.tags = tags;
          }
          setSubmitting(documentSaveButton, true, 'Saving...');
          try {
            const response = await fetch(API_BASE + '/documents', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });
            if (!response.ok) {
              throw new Error('save failed');
            }
            const saved = await response.json().catch(function () { return null; });
            const savedCategory = saved && saved.category ? String(saved.category) : '';
            setModalMessage(
              savedCategory
                ? ('Saved successfully. Auto category: ' + savedCategory + '. Closing...')
                : 'Saved successfully. Closing...',
              false
            );
            showGlobalToast(
              'Saved',
              savedCategory ? ('Saved successfully. Auto category: ' + savedCategory + '.') : 'Saved successfully.',
              false
            );
            documentForm.reset();
            await refreshDiscFromBackend();
            setTimeout(function () {
              closeDocumentModal();
            }, 900);
          } catch (error) {
            setModalMessage('Save failed. Please check backend service.', true);
            showGlobalToast('Save failed', 'Please check backend service.', true);
          } finally {
            setSubmitting(documentSaveButton, false);
          }
        });
      }

      if (uploadDocumentForm) {
        uploadDocumentForm.addEventListener('submit', async function (event) {
          event.preventDefault();
          const title = String(docTitleInput && docTitleInput.value || '').trim();
          const category = String(docCategoryInput && docCategoryInput.value || '').trim();
          const tags = String(docTagsInput && docTagsInput.value || '').trim();
          const file = uploadFileInput && uploadFileInput.files ? uploadFileInput.files[0] : null;
          if (!file) {
            setModalMessage('Please choose a file first.', true);
            return;
          }
          const data = new FormData();
          data.append('file', file);
          if (title) data.append('title', title);
          if (category) data.append('category', category);
          if (tags) data.append('tags', tags);
          setSubmitting(uploadSubmitButton, true, 'Uploading...');
          try {
            const response = await fetch(API_BASE + '/documents/upload', {
              method: 'POST',
              body: data
            });
            if (!response.ok) {
              throw new Error('upload failed');
            }
            const saved = await response.json().catch(function () { return null; });
            const savedCategory = saved && saved.category ? String(saved.category) : '';
            setModalMessage(
              savedCategory
                ? ('Uploaded successfully. Auto category: ' + savedCategory + '. Closing...')
                : 'Uploaded successfully. Closing...',
              false
            );
            showGlobalToast(
              'Uploaded',
              savedCategory ? ('Uploaded successfully. Auto category: ' + savedCategory + '.') : 'Uploaded successfully.',
              false
            );
            uploadDocumentForm.reset();
            selectedFileName.textContent = 'Selected: none';
            await refreshDiscFromBackend();
            setTimeout(function () {
              closeDocumentModal();
            }, 900);
          } catch (error) {
            setModalMessage('Upload failed. Please check backend logs.', true);
            showGlobalToast('Upload failed', 'Please check backend logs.', true);
          } finally {
            setSubmitting(uploadSubmitButton, false);
          }
        });
      }

      (async function () {
        setDiscSync(true, 'Synchronizing your themes and saved moments');
        backendBoards = await waitForBackendBoards();
        state.rotation = 0;
        initDisc();
        syncResolved = true;
        setDiscSync(false);
      })();
    })();
  </script>
</body>
</html>
