  <script>
    (function () {
      const API_BASE = (window.__POCKETY_API_BASE__ || '/api').replace(/\/$/, '');
      const navConfig = [
        { id: 'navHome', path: './home.html' },
        { id: 'navFavorite', path: './favorites-travel.html' },
        { id: 'navHistory', path: './history-report.html' },
        { id: 'navWeekly', path: './weekly-report.html' },
        { id: 'navProfile', path: './profile.html' }
      ];

      const thisWeekCard = document.getElementById('cardThisWeek');
      const aiChatButton = document.getElementById('aiChatButton');
      const thisWeekTag1 = document.getElementById('thisWeekTag1');
      const thisWeekTag2 = document.getElementById('thisWeekTag2');

      async function hydrateThisWeekTags() {
        try {
          const response = await fetch(API_BASE + '/documents');
          if (!response.ok) return;
          const docs = await response.json();
          if (!Array.isArray(docs) || !docs.length) return;

          const now = Date.now();
          const weekAgo = now - 7 * 24 * 60 * 60 * 1000;
          const counts = Object.create(null);

          docs.forEach(function (doc) {
            const created = new Date(doc.created_at || 0).getTime();
            if (!created || created < weekAgo || created > now) return;
            const key = String(doc.category || 'other').toLowerCase();
            counts[key] = (counts[key] || 0) + 1;
          });

          const ranked = Object.keys(counts).sort(function (a, b) {
            return counts[b] - counts[a];
          });
          if (!ranked.length) return;

          if (thisWeekTag1) {
            thisWeekTag1.innerHTML = '<span class="tracking-[0px]">#' + ranked[0] + '</span>';
          }
          if (thisWeekTag2 && ranked[1]) {
            thisWeekTag2.innerHTML = '<span class="tracking-[0px]">#' + ranked[1] + '</span>';
          }
        } catch (error) {
          // Keep static text.
        }
      }

      const backButton = document.getElementById('backButton');
      if (backButton) {
        backButton.addEventListener('click', function () {
          if (document.referrer) {
            window.history.back();
            return;
          }
          window.location.href = './home.html';
        });
      }

      if (thisWeekCard) {
        thisWeekCard.addEventListener('click', function () {
          thisWeekCard.classList.add('card-press');
          setTimeout(function () {
            window.location.href = './report-summary.html';
          }, 90);
        });
      }

      if (aiChatButton) {
        aiChatButton.addEventListener('click', function () {
          aiChatButton.classList.add('card-press');
          setTimeout(function () {
            window.location.href = './ai-assistant.html';
          }, 90);
        });
      }

      navConfig.forEach(function (item) {
        const button = document.getElementById(item.id);
        if (!button) {
          return;
        }

        button.addEventListener('click', function () {
          button.classList.add('nav-press');
          setTimeout(function () {
            window.location.href = item.path;
          }, 90);
        });
      });

      hydrateThisWeekTags();
    })();
  </script>
