    body {

    .toggle-switch {
      position: relative;
      width: 67px;
      height: 38px;
      border: 0;
      padding: 0;
      background: rgba(186, 201, 193, 0.9);
      border-radius: 65px;
      cursor: pointer;
      transition: background-color 220ms ease, box-shadow 220ms ease;
    }

    .toggle-switch::after {
      content: '';
      position: absolute;
      width: 31px;
      height: 36px;
      background: white;
      border-radius: 50%;
      top: 1px;
      left: 2px;
      transition: transform 220ms ease;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    .toggle-switch.is-on {
      background: rgba(22, 255, 22, 1);
      box-shadow: 0 0 0 2px rgba(22, 255, 22, 0.1);
    }

    .toggle-switch.is-on::after {
      transform: translateX(32px);
    }

    .toggle-switch:focus-visible {
      outline: 2px solid rgba(52, 129, 255, 0.9);
      outline-offset: 2px;
    }
  </style>
</head>

  <script>
    (function () {
      var STORAGE_KEY = 'pockety-authorized-app-toggles';
      var defaultState = { bilibili: true, rednote: true, tiktok: true };

      function readState() {
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return Object.assign({}, defaultState);
          var parsed = JSON.parse(raw);
          return Object.assign({}, defaultState, parsed || {});
        } catch (error) {
          return Object.assign({}, defaultState);
        }
      }

      function writeState(state) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function applyToggle(button, enabled) {
        button.classList.toggle('is-on', enabled);
        button.setAttribute('aria-checked', enabled ? 'true' : 'false');
      }

      var state = readState();
      var toggles = document.querySelectorAll('[data-app-toggle]');
      toggles.forEach(function (button) {
        var key = button.getAttribute('data-app-toggle');
        var enabled = !!state[key];
        applyToggle(button, enabled);

        button.addEventListener('click', function () {
          enabled = !enabled;
          state[key] = enabled;
          applyToggle(button, enabled);
          writeState(state);
        });
      });
    })();
  </script>
