<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pockety - Login</title>
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>
  <script>
    tailwind.config = {
      mode: 'jit',
      important: true,
    }
  </script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Segoe UI', Roboto, sans-serif;
    }
  </style>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">
  <div class="w-[402px] h-[874px] overflow-hidden bg-[rgba(255,255,255,1)] relative shadow-2xl">
    <!-- Background gradient image -->
    <img src="./public/assets/login/image_1.png" class="w-[518px] h-[517px] absolute top-[23px] -left-[126px]" />
    
    <!-- Decorative element -->
    <img src="./public/assets/login/image_2.png" class="w-[242px] h-[242px] absolute top-[129px] left-[38px]" />
    
    <!-- Status Bar -->
    <div class="w-[506px] h-[62px] flex flex-row flex-nowrap justify-center items-center pt-[21px] box-border pb-[19px] absolute top-[6px] -left-[60px]">
      <div class="w-[152px] h-[22px] flex flex-row flex-nowrap justify-center items-center pt-[1.50px] box-border mr-[154px]">
        <div class="text-[17px] whitespace-nowrap text-center text-[rgba(0,0,0,1)] leading-[22px] tracking-[normal] font-[590]">
          <span class="tracking-[0px]">9:41</span>
        </div>
      </div>
      <div class="w-[152px] h-[22px] flex flex-row flex-nowrap justify-center items-center pt-px box-border pr-px">
        <img src="./public/assets/login/image_3.png" class="w-[19.20px] h-[12.23px] mr-[7px]" />
        <img src="./public/assets/login/image_4.png" class="w-[17.14px] h-[12.33px] mr-[7px]" />
        <img src="./public/assets/login/image_5.png" class="w-[27.33px] h-[13px]" />
      </div>
    </div>
    
    <!-- Decorative element -->
    <img src="./public/assets/login/image_6.png" class="w-[171px] h-[173px] absolute top-[509px] left-[263px]" />
    
    <!-- Back button -->
    <img src="./public/assets/login/image_7.png" class="w-[24.67px] h-[23.33px] absolute top-[78px] left-[28px]" />
    
    <!-- Title -->
    <div class="absolute top-[130px] left-[43px] text-[24px] whitespace-nowrap text-center text-[rgba(0,0,0,1)] leading-[22px] tracking-[normal] font-[590]">
      <span class="tracking-[1px]">Login to Ask Your Favorites</span>
    </div>
    
    <!-- Phone input background -->
    <div class="w-[334px] opacity-[0.65] rounded-[8px] bg-[rgba(255,255,255,1)] min-h-[47px] absolute top-[196px] left-[34px]"></div>
    
    <!-- Verification code input background -->
    <div class="w-[334px] opacity-[0.65] rounded-[8px] bg-[rgba(255,255,255,1)] min-h-[47px] absolute top-[267px] left-[34px]"></div>
    
    <!-- Login button background -->
    <div class="w-[334px] opacity-[0.68] rounded-[41px] bg-[rgba(255,255,255,1)] min-h-[47px] absolute top-[351px] left-[34px]"></div>
    
    <!-- Phone input content -->
    <div class="absolute top-[208px] left-[50px] text-[16px] whitespace-nowrap text-center text-[rgba(74,74,74,1)] leading-[22px] tracking-[normal] font-[590]">
      <span class="tracking-[0px]">+86</span>
    </div>
    <img src="./public/assets/login/image_8.png" class="h-[18px] absolute top-[210px] left-[93px]" />
    <div class="absolute top-[208px] left-[116px] text-[16px] whitespace-nowrap text-center text-[rgba(74,74,74,1)] leading-[22px] tracking-[normal] font-[590]">
      <span class="tracking-[0px]">Enter Phone Number</span>
    </div>
    
    <!-- Verification code content -->
    <div class="absolute top-[280px] left-[50px] text-[16px] whitespace-nowrap text-center text-[rgba(74,74,74,1)] leading-[22px] tracking-[normal] font-[590]">
      <span class="tracking-[0px]">Enter Verification Code</span>
    </div>
    <div class="absolute top-[280px] left-[283px] text-[16px] whitespace-nowrap text-center text-[rgba(71,115,89,1)] leading-[22px] tracking-[normal] font-[590]">
      <span class="tracking-[0px]">Get Code</span>
    </div>
    
    <!-- Login button text -->
    <div class="absolute top-[364px] left-[147px] text-[20px] whitespace-nowrap text-center text-[rgba(60,60,60,1)] leading-[22px] tracking-[normal] font-[590]">
      <span class="tracking-[1px]">Login Now</span>
    </div>
    
    <!-- Agreement checkbox -->
    <img src="./public/assets/login/image_9.png" class="w-[17px] h-[17px] absolute top-[424px] left-[51px]" />
    <div class="absolute top-[422px] left-[75px] text-[12px] whitespace-nowrap text-center text-[rgba(83,83,83,1)] leading-[22px] tracking-[normal] font-[590]">
      <span class="tracking-[0px]">I have read and agree to the User Agreement</span>
    </div>
  </div>
</body>
</html>
