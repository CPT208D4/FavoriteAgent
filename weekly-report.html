  <script>
    (function () {
      const navConfig = [
        { id: 'navHome', path: './home.html' },
        { id: 'navFavorite', path: './favorites-travel.html' },
        { id: 'navHistory', path: './history-report.html' },
        { id: 'navWeekly', path: './weekly-report.html' },
        { id: 'navProfile', path: './profile.html' },
      ];

      const moreDetailsButton = document.getElementById('moreDetailsButton');
      const moreReportsButton = document.getElementById('moreReportsButton');

      if (moreDetailsButton) {
        moreDetailsButton.addEventListener('click', function () {
          moreDetailsButton.classList.add('nav-press');
          setTimeout(function () {
            window.location.href = './report-summary.html';
          }, 90);
        });
      }

      if (moreReportsButton) {
        moreReportsButton.addEventListener('click', function () {
          moreReportsButton.classList.add('nav-press');
          setTimeout(function () {
            window.location.href = './history-report.html';
          }, 90);
        });
      }

      navConfig.forEach(function (item) {
        const button = document.getElementById(item.id);
        if (!button) {
          return;
        }

        button.addEventListener('click', function () {
          button.classList.add('nav-press');
          setTimeout(function () {
            window.location.href = item.path;
          }, 90);
        });
      });
    })();
  </script>
